name: Invite New Student

on:
  workflow_dispatch:
    inputs:
      student_username:
        description: "Student's GitHub username"
        required: true
        type: string
      student_name:
        description: "Student's full name"
        required: true
        type: string
      first_mission:
        description: 'First mission ID (default: html-1-1)'
        required: false
        default: 'html-1-1'
        type: string

jobs:
  invite-student:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      
    steps:
      - name: Checkout master repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Create student file
        run: |
          # Copy template and fill in student details
          cp students/TEMPLATE.json students/${{ github.event.inputs.student_username }}.json
          
          # Replace placeholders
          sed -i "s/STUDENT_ID/$(uuidgen)/g" students/${{ github.event.inputs.student_username }}.json
          sed -i "s/GITHUB_USERNAME/${{ github.event.inputs.student_username }}/g" students/${{ github.event.inputs.student_username }}.json
          sed -i "s/FULL_NAME/${{ github.event.inputs.student_name }}/g" students/${{ github.event.inputs.student_username }}.json
          sed -i "s/2024-01-01/$(date +%Y-%m-%d)/g" students/${{ github.event.inputs.student_username }}.json
          sed -i "s/python-mission-1/${{ github.event.inputs.first_mission }}/g" students/${{ github.event.inputs.student_username }}.json

      - name: Commit student file
        run: |
          git config user.name "CodeQuest Bot"
          git config user.email "bot@codequest.dev"
          git add students/
          git commit -m "✨ Add new student: ${{ github.event.inputs.student_username }}"
          git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests PyNaCl

      - name: Create student's first mission repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python .github/workflows/create-student-repo.py \
            "${{ github.event.inputs.student_username }}" \
            "${{ github.event.inputs.student_name }}" \
            "${{ github.event.inputs.first_mission }}"
          
      - name: Welcome message
        run: |
          echo "✅ Student ${{ github.event.inputs.student_name }} (@${{ github.event.inputs.student_username }}) has been added!"
          echo "First mission: ${{ github.event.inputs.first_mission }}"
